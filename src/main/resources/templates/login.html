<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar Sesión - Mattfuncional</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Fondo oscuro con acento violeta (branding Mattfuncional); sin imagen externa para no romper si falta el archivo */
        body.login-page {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 42%, #4c1d95 100%);
        }

        .login-container {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            border: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0;
            padding: 1.75rem 1.5rem;
            text-align: center;
        }

        .login-header h2 {
            font-weight: 700;
            font-size: clamp(1.25rem, 4vw, 1.75rem);
        }

        .login-header p {
            font-size: 0.95rem;
            opacity: 0.95;
        }

        .login-card .card-body {
            background: #fff;
        }

        .login-card #togglePassword {
            border-color: #dee2e6;
        }

        .login-card #togglePassword:hover {
            background: #f8f9fa;
        }

        @media (max-width: 991px) {
            .login-container {
                align-items: flex-start;
                padding-top: max(1.5rem, env(safe-area-inset-top));
            }
            .login-card {
                margin-top: 0.25rem;
            }
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 0.75rem;
                padding-top: max(1.25rem, env(safe-area-inset-top));
                padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            }
            .login-header {
                padding: 1.35rem 1rem;
            }
            .login-header p {
                font-size: 0.88rem;
            }
            .login-card .card-body {
                padding: 1.25rem !important;
            }
            .login-card .form-label {
                font-size: 0.95rem;
            }
            .login-card .btn-lg {
                padding: 0.75rem 1rem;
                min-height: 48px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="card login-card">
            <div class="login-header">
                <h2><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h2>
                <p class="mb-0">Bienvenido a Mattfuncional</p>
            </div>
            <div class="card-body p-4 p-lg-5">

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Usuario o contraseña incorrectos.
                </div>

                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                     <i class="fas fa-check-circle me-2"></i>
                    Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/logincheck}" method="post">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="username" name="username" placeholder="tu.correo@ejemplo.com" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
                            <button type="button" class="btn btn-outline-secondary" id="togglePassword" title="Mostrar u ocultar contraseña" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            var input = document.getElementById('password');
            var icon = document.getElementById('togglePasswordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                this.setAttribute('aria-label', 'Ocultar contraseña');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                this.setAttribute('aria-label', 'Mostrar contraseña');
            }
        });
    </script>
</body>
</html>
