<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar Sesión - Mattfuncional</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        /*
         * Entorno 2 (≤991px): login.png con contain en capa fija — se ve el arte entero sin recortes ni desplazar el fondo.
         * Escritorio (≥992px): logo-Navbar.png cover en body.
         */
        body.login-page {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background-color: #c5c5c5;
            background-image: url(/img/logo-Navbar.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }

        .login-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            border: 1px solid rgba(45, 45, 45, 0.12);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28), 0 2px 12px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .login-header {
            background: linear-gradient(180deg, #3a3a3a 0%, #2d2d2d 100%);
            color: #f0f0f0;
            border-radius: 0;
            padding: 1.5rem 1.25rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
        }

        .login-header h2 {
            font-weight: 700;
            font-size: clamp(1.2rem, 3.8vw, 1.65rem);
            letter-spacing: 0.02em;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
            color: #d0d0d0;
        }

        .login-card .card-body {
            background: rgba(252, 252, 252, 0.97);
            color: #2d2d2d;
        }

        .login-card .form-label {
            color: #333;
        }

        .login-card .input-group-text {
            background: #ececec;
            border-color: #c8c8c8;
            color: #444;
        }

        .login-card .form-control {
            border-color: #c8c8c8;
            background: #fff;
        }

        .login-card .form-control:focus {
            border-color: #5a5a5a;
            box-shadow: 0 0 0 0.2rem rgba(45, 45, 45, 0.12);
        }

        .login-card #togglePassword {
            border-color: #c8c8c8;
            color: #444;
        }

        .login-card #togglePassword:hover {
            background: #eaeaea;
        }

        .login-card .btn-login-submit {
            background: linear-gradient(180deg, #3d3d3d 0%, #2d2d2d 100%);
            border: 1px solid #1f1f1f;
            color: #fff;
            font-weight: 600;
        }

        .login-card .btn-login-submit:hover {
            background: linear-gradient(180deg, #4a4a4a 0%, #353535 100%);
            color: #fff;
        }

        /* Entorno 2: arte completo visible (contain) en capa fija; relleno #d0d0d0 si hay bandas */
        @media (max-width: 991.98px) {
            body.login-page {
                background-image: none;
                background-color: #d0d0d0;
                position: relative;
                overflow-x: hidden;
            }

            body.login-page::before {
                content: '';
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
                background-color: #d0d0d0;
                background-image: url(/img/login.png);
                background-repeat: no-repeat;
                background-position: center top;
                background-size: contain;
            }

            .login-container {
                justify-content: flex-start;
                padding-top: clamp(13.5rem, 49vh, 28rem);
                padding-bottom: max(1.75rem, calc(env(safe-area-inset-bottom) + 1.25rem), 5vh);
            }

            .login-card {
                margin-top: 0;
            }
        }

        @media (max-width: 576px) {
            .login-container {
                padding-left: max(0.75rem, env(safe-area-inset-left));
                padding-right: max(0.75rem, env(safe-area-inset-right));
                padding-top: clamp(12.25rem, 47vh, 24rem);
                padding-bottom: max(1.5rem, calc(env(safe-area-inset-bottom) + 1rem), 6vh);
            }
            .login-header {
                padding: 1.25rem 1rem;
            }
            .login-header p {
                font-size: 0.85rem;
            }
            .login-card .card-body {
                padding: 1.25rem !important;
            }
            .login-card .form-label {
                font-size: 0.95rem;
            }
            .login-card .btn-lg {
                padding: 0.75rem 1rem;
                min-height: 48px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="card login-card">
            <div class="login-header">
                <h2><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h2>
                <p class="mb-0">Bienvenido a Mattfuncional</p>
            </div>
            <div class="card-body p-4 p-lg-5">

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Usuario o contraseña incorrectos.
                </div>

                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                     <i class="fas fa-check-circle me-2"></i>
                    Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/logincheck}" method="post">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="username" name="username" placeholder="tu.correo@ejemplo.com" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
                            <button type="button" class="btn btn-outline-secondary" id="togglePassword" title="Mostrar u ocultar contraseña" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-login-submit btn-lg fw-bold">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            var input = document.getElementById('password');
            var icon = document.getElementById('togglePasswordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                this.setAttribute('aria-label', 'Ocultar contraseña');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                this.setAttribute('aria-label', 'Mostrar contraseña');
            }
        });
    </script>
</body>
</html>
