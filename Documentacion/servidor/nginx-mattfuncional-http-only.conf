# Mattfuncional — solo HTTP (puerto 80), proxy a Spring Boot :8080
# Usar hasta tener DNS + Certbot; después se puede sustituir por nginx-mattfuncional-com-ar.conf
#
# Instalación en Ubuntu:
#   sudo cp nginx-mattfuncional-http-only.conf /etc/nginx/sites-available/mattfuncional
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -sf /etc/nginx/sites-available/mattfuncional /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name mattfuncional.com.ar www.mattfuncional.com.ar _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
