# Mattfuncional - mattfuncional.com.ar (HTTP -> HTTPS, SSL)
# Plantilla para el servidor del cliente. Copiar a:
#   /etc/nginx/sites-available/mattfuncional.com.ar
# Tras ejecutar Certbot, las rutas a los .pem suelen quedar bajo:
#   /etc/letsencrypt/live/mattfuncional.com.ar/
#
# Ajustar server_name si solo usás el dominio sin www o si el registrante
# añade otros hostnames.

# Redirigir www a la versión sin www (canonical)
server {
    listen 80;
    listen [::]:80;
    server_name www.mattfuncional.com.ar;
    return 301 https://mattfuncional.com.ar$request_uri;
}

# Redirigir HTTP a HTTPS (host principal)
server {
    listen 80;
    listen [::]:80;
    server_name mattfuncional.com.ar;
    return 301 https://$host$request_uri;
}

# Sitio principal HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mattfuncional.com.ar;
    ssl_certificate /etc/letsencrypt/live/mattfuncional.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mattfuncional.com.ar/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# www por HTTPS también redirige a sin www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.mattfuncional.com.ar;
    ssl_certificate /etc/letsencrypt/live/mattfuncional.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mattfuncional.com.ar/privkey.pem;
    return 301 https://mattfuncional.com.ar$request_uri;
}
